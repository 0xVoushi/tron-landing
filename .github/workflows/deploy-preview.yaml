name: App Platform Preview

# On every PR opened/updated against main, spin up a per-PR ephemeral
# DigitalOcean App Platform instance.
#
# We can't use the action's built-in `deploy_pr_preview: true` mode
# because it generates the app name as <owner>-<repo>-<pr>-<hash>, and
# the lowercased owner "0xvoushi" starts with a digit — that violates
# DO's app name regex ^[a-z][a-z0-9-]{0,30}[a-z0-9]$. So we sanitise
# the spec ourselves (set a valid name, strip domains/alerts/ingress,
# override branch + disable deploy_on_push) and call the action with
# our generated spec instead.
#
# Comments on the PR with the preview URL on success, or with build
# and deploy logs on failure. Closing the PR triggers delete-preview.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate preview spec
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          yq eval '
            .name = "tron-landing-pr-" + strenv(PR_NUMBER) |
            del(.domains) |
            del(.alerts) |
            del(.ingress) |
            .services[].github.branch = strenv(HEAD_REF) |
            .services[].github.deploy_on_push = false
          ' .do/app.yaml > preview-spec.yaml
          echo "--- preview-spec.yaml ---"
          cat preview-spec.yaml

      - name: Deploy preview app
        id: deploy
        uses: digitalocean/app_action/deploy@v2
        with:
          app_spec_location: preview-spec.yaml
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Comment with preview URL
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const app = JSON.parse(`${{ steps.deploy.outputs.app }}`)
            const url = app.live_url || app.default_ingress
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed: ${url}\n\nApp ID: \`${app.id}\`\nLast updated: ${new Date().toISOString()}`,
            })

      - name: Comment with failure logs
        if: failure()
        uses: actions/github-script@v7
        env:
          BUILD_LOGS: ${{ steps.deploy.outputs.build_logs }}
          DEPLOY_LOGS: ${{ steps.deploy.outputs.deploy_logs }}
        with:
          script: |
            const { BUILD_LOGS, DEPLOY_LOGS } = process.env
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            const body = [
              `❌ Preview deploy failed. [Action run](${runUrl})`,
              '',
              '<details><summary>Build logs</summary>',
              '',
              '```',
              (BUILD_LOGS || '(empty)').slice(0, 60000),
              '```',
              '',
              '</details>',
              '',
              '<details><summary>Deploy logs</summary>',
              '',
              '```',
              (DEPLOY_LOGS || '(empty)').slice(0, 60000),
              '```',
              '',
              '</details>',
            ].join('\n')
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            })
