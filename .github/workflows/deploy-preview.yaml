name: App Platform Preview

# On every PR opened/updated against main, spin up a per-PR ephemeral
# DigitalOcean App Platform instance using the spec at .do/app.yaml.
# The action transforms the spec for preview mode automatically:
#   - strips the `domains` block (preview gets *.ondigitalocean.app)
#   - overrides the source branch with the PR head ref
#   - names the app uniquely per PR (so re-opening updates the same one)
# A comment is posted on the PR with the preview URL. Closing the PR
# deletes the preview app (see delete-preview.yaml).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy preview app
        id: deploy
        uses: digitalocean/app_action/deploy@v2
        with:
          deploy_pr_preview: "true"
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Comment with preview URL
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const app = JSON.parse(`${{ steps.deploy.outputs.app }}`)
            const url = app.live_url || app.default_ingress
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed: ${url}\n\nApp ID: \`${app.id}\`\nLast updated: ${new Date().toISOString()}`,
            })

      - name: Comment with failure logs
        if: failure()
        uses: actions/github-script@v7
        env:
          BUILD_LOGS: ${{ steps.deploy.outputs.build_logs }}
          DEPLOY_LOGS: ${{ steps.deploy.outputs.deploy_logs }}
        with:
          script: |
            const { BUILD_LOGS, DEPLOY_LOGS } = process.env
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            const body = [
              `❌ Preview deploy failed. [Action run](${runUrl})`,
              '',
              '<details><summary>Build logs</summary>',
              '',
              '```',
              (BUILD_LOGS || '(empty)').slice(0, 60000),
              '```',
              '',
              '</details>',
              '',
              '<details><summary>Deploy logs</summary>',
              '',
              '```',
              (DEPLOY_LOGS || '(empty)').slice(0, 60000),
              '```',
              '',
              '</details>',
            ].join('\n')
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            })
