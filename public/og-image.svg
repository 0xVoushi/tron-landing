<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="80%" cy="22%" r="62%">
      <stop offset="0%" stop-color="#c43631" stop-opacity="0.55" />
      <stop offset="55%" stop-color="#c43631" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#c43631" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#0f0f10" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- brand mark: overlapping rounded squares -->
  <g transform="translate(96 86)">
    <rect x="0" y="0" width="44" height="44" rx="12" fill="#e0564f" />
    <rect x="26" y="0" width="44" height="44" rx="12" fill="#c43631" />
  </g>
  <text x="166" y="118" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="0.5">TRON Multisender</text>

  <!-- eyebrow -->
  <text x="98" y="290" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#b9b9b9">Batch Transfer<tspan fill="#e0564f">  ·  TRON</tspan></text>

  <!-- headline -->
  <text x="92" y="372" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">Batch send TRX &amp; TRC-20</text>
  <text x="92" y="458" font-family="Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">to 1,000+ addresses</text>

  <!-- accent underline -->
  <rect x="96" y="498" width="120" height="6" rx="3" fill="#c43631" />

  <!-- subline (mirrors existing hero copy) -->
  <text x="98" y="556" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#b1b1b1">One transaction · No registration · Fully non-custodial</text>
</svg>
